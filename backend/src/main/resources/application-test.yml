#resources/application-test.yml:


spring:
    application:
        name: the-duckers-backend-test

    datasource:
        username: test
        password: test
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: create-drop
        show-sql: false
        defer-datasource-initialization: true

    sql:
        init:
            mode: always

springdoc:
    api-docs:
        enabled: false
    swagger-ui:
        enabled: false

security:
    jwt:
        secret: integration-test-secret-integration-test-secret-123456
        expiration-minutes: 60